<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projeto HTML</title>
    <!-- Descreve o conteúdo da página -->
    <meta
      name="description"
      content="Blog com conteúdos de tecnologia Front-End."
    />
  </head>
  <body>
    <!-- Cabeçalho -->
    <header>
      <h1>Meu Blog de Tecnologia</h1>
      <!-- Declarou a navegação do HTML5 -->
      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Posts</a></li>
        </ul>
      </nav>
    </header>

    <!-- Conteúdo principal -->
    <main>
      <!-- Agrupo conteúdos por tipo -->
      <section>
        <!-- Descrição do conteúdo -->
        <article>
          <h2>As novidades do HTML 5</h2>
          <p>
            O HTML facilitou a vida dos desenvolvedores, mas também os
            buscadores...
          </p>
        </article>
      </section>
      <!-- Grupo de conteúdos de Vídeo -->
      <section>
        <h2>Vídeo torcida do Corinthians!</h2>
        <iframe
          width="560"
          height="315"
          src="https://www.youtube.com/embed/h05EWws4osM?si=8flOyWHwCZ0pvt--"
          title="YouTube video player"
          frameborder="0"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
            web-share;
          "
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
          loading="lazy"
        ></iframe>
      </section>
    </main>
    <!-- Menu/Conteúdo Lateral da página -->
    <aside>
      <h3>Links úteis</h3>
      <p>Confira a documentação do MDN ou W3S</p>
    </aside>

    <!-- Rodapé -->
    <footer>
      <p>&copy;Construído em 2026 com muito café e energético!</p>
    </footer>
  </body>
</html>
